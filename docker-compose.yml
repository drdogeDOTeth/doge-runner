# Coolify-compatible Docker Compose file for DOGE RUNNER / DOGE KADE REMIX
#
# Builds from the LOCAL Dockerfile in this repo — no GHCR image, no GitHub
# Actions dependency. Coolify clones the repo and builds it fresh on deploy.
#
# DEPLOYMENT STEPS:
# 1. In Coolify: New Resource → Public Repository (or your GitHub app) →
#    pick this repo, branch: main
# 2. Build Pack: Docker Compose (this file is auto-detected at the repo root)
# 3. Deploy. Enable "Auto Deploy" on the resource so every git push rebuilds.
# 4. Service → Domains → add dr.tattedalien.club — Coolify handles SSL.
#
# IMPORTANT: Do NOT add a ports: section — Coolify routes via Traefik.

services:
  game:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
